<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: rgba(10, 10, 15, 0.95);
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.1);
    user-select: none;
    -webkit-app-region: drag;
  }
  .logo {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: linear-gradient(135deg, #06b6d4, #3b82f6);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    font-weight: bold;
    margin-bottom: 20px;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(6,182,212,0.3); }
    50% { transform: scale(1.05); box-shadow: 0 0 40px rgba(6,182,212,0.5); }
  }
  h1 {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }
  .subtitle {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 30px;
  }
  .loader {
    width: 200px;
    height: 3px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 12px;
  }
  .loader-bar {
    height: 100%;
    background: linear-gradient(90deg, #06b6d4, #3b82f6, #06b6d4);
    background-size: 200% 100%;
    animation: loading 1.5s ease-in-out infinite;
    border-radius: 3px;
  }
  @keyframes loading {
    0% { width: 0%; background-position: 0% 0%; }
    50% { width: 70%; background-position: 100% 0%; }
    100% { width: 100%; background-position: 0% 0%; }
  }
  .status {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
  }
  .version {
    position: absolute;
    bottom: 15px;
    font-size: 10px;
    color: rgba(255,255,255,0.2);
  }
</style>
</head>
<body>
  <div class="logo">V</div>
  <h1>VoxiDub.AI</h1>
  <p class="subtitle">AI Video Dubbing Desktop</p>
  <div class="loader"><div class="loader-bar"></div></div>
  <p class="status">Starting backend server...</p>
  <p class="version">v1.0.0</p>
</body>
</html>
